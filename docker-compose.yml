services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: laravel_rag
      POSTGRES_USER: laravel_rag
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel_rag -d laravel_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
